name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memcore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memcore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Apply schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memcore
          REDIS_URL: redis://localhost:6379/0
        run: pnpm db:reset
      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memcore
          REDIS_URL: redis://localhost:6379/0
        run: pnpm test
