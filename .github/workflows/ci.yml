name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (mypy)
        run: mypy src
      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memcore
          REDIS_URL: redis://localhost:6379/0
        run: pytest
